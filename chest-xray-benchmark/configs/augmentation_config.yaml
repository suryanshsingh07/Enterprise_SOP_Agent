# =============================================================================
# Augmentation Configuration — Chest X-ray Benchmark
# =============================================================================

# ── Training Augmentations ────────────────────────────────────────────────────
train:
  horizontal_flip:
    enabled: true
    probability: 0.5

  rotation:
    enabled: true
    degrees: 10                # ±10° random rotation

  affine:
    enabled: true
    translate: [0.05, 0.05]    # max 5% translation in x and y
    scale: [0.95, 1.05]        # 95%–105% scaling

  color_jitter:
    enabled: true
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
    hue: 0.05

  random_erasing:
    enabled: true
    probability: 0.2
    scale: [0.02, 0.1]        # erase 2%–10% of image area

  gaussian_blur:
    enabled: false
    kernel_size: 3
    probability: 0.1

# ── Validation / Test (no augmentation) ──────────────────────────────────────
val:
  resize: 224
  normalize: true

test:
  resize: 224
  normalize: true

# ── Normalization (ImageNet stats) ────────────────────────────────────────────
normalize:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
