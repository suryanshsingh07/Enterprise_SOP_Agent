# =============================================================================
# Classical ML Hyperparameter Configuration — Chest X-ray Benchmark
# =============================================================================

# ── Feature Extraction ────────────────────────────────────────────────────────
features:
  hog:
    orientations: 9
    pixels_per_cell: [16, 16]
    cells_per_block: [2, 2]
    block_norm: "L2-Hys"
    # Output dim for 224x224: 6084
  lbp:
    radius: 3
    n_points: 24
    method: "uniform"
    # Output dim: 26 (n_points + 2)
  combined_dim: 6110              # HOG(6084) + LBP(26)
  pca_dim: 512
  scaler: "standard"             # StandardScaler before PCA

# ── SVM ───────────────────────────────────────────────────────────────────────
svm:
  C: 10.0                        # Tuning range: [0.01, 100]
  kernel: "rbf"                   # Options: rbf, linear, poly
  gamma: "scale"                  # Options: scale, auto, float
  probability: true
  class_weight: "balanced"
  decision_function_shape: "ovr"

# ── Logistic Regression ──────────────────────────────────────────────────────
logistic_regression:
  C: 1.0                         # Tuning range: [0.001, 100]
  solver: "lbfgs"
  max_iter: 2000
  multi_class: "multinomial"
  class_weight: "balanced"

# ── XGBoost ───────────────────────────────────────────────────────────────────
xgboost:
  n_estimators: 300               # Tuning range: [100, 500]
  max_depth: 6                    # Tuning range: [3, 8]
  learning_rate: 0.05             # Tuning range: [0.01, 0.3] (log scale)
  subsample: 0.8                  # Tuning range: [0.6, 1.0]
  colsample_bytree: 0.8          # Tuning range: [0.6, 1.0]
  min_child_weight: 3            # Tuning range: [1, 10]
  gamma: 0.1                     # Tuning range: [0, 5]
  objective: "multi:softprob"
  tree_method: "hist"
  eval_metric: "mlogloss"

# ── AdaBoost ──────────────────────────────────────────────────────────────────
adaboost:
  n_estimators: 200               # Tuning range: [50, 500]
  learning_rate: 0.1              # Tuning range: [0.01, 1.0]
  base_estimator:
    type: "DecisionTreeClassifier"
    max_depth: 2                  # Tuning range: [1, 5]

# ── Optuna Tuning ─────────────────────────────────────────────────────────────
optuna:
  n_trials: 50
  objective_metric: "macro_f1"
  storage: "experiments/optuna_xgboost.db"
  study_name: "xgboost_chest_xray"
