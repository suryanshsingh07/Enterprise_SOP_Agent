# =============================================================================
# YOLOv8 Dataset Configuration — Chest X-ray Benchmark
# =============================================================================
# Used by ultralytics YOLOv8 training

path: ../data                      # dataset root dir
train: annotations/yolo/train      # train images (relative to 'path')
val: annotations/yolo/val          # val images (relative to 'path')

# Classes
names:
  0: Normal
  1: COVID-19
  2: Pneumonia
  3: Tuberculosis
  4: Lung_Cancer
  5: Fibrosis

# Number of classes
nc: 6
