# =============================================================================
# Dataset Configuration — Chest X-ray Benchmark
# =============================================================================
# This file defines all 6 source dataset paths, format specs, and the
# unified label schema mapping.

# ── Unified Label Schema ─────────────────────────────────────────────────────
unified_classes:
  0: "Normal"
  1: "COVID-19"
  2: "Pneumonia"
  3: "Tuberculosis"
  4: "Lung_Cancer"
  5: "Fibrosis"

# ── Data Split Ratios ────────────────────────────────────────────────────────
split:
  train: 0.70
  val: 0.15
  test: 0.15
  seed: 42

# ── Balancing ─────────────────────────────────────────────────────────────────
balancing:
  strategy: "oversample"       # oversample | undersample | cap
  max_per_class: 5000

# ── Image Processing ──────────────────────────────────────────────────────────
image:
  size: 224
  channels: 3                  # RGB for DL models

# ── Output Paths ──────────────────────────────────────────────────────────────
output:
  processed_dir: "data/processed"
  manifests_dir: "data/manifests"
  annotations_dir: "data/annotations"

# ── Source Datasets ───────────────────────────────────────────────────────────
datasets:

  # 1. COVID-QU-Ex: Large COVID / Normal / Pneumonia dataset
  covid_qu_ex:
    root: "data/raw/covid_qu_ex"
    format: "imagenet_folder"          # subdirectory per class
    classes:
      - source_name: "COVID-19"
        target_id: 1
      - source_name: "Non-COVID"       # mapped to Pneumonia
        target_id: 2
      - source_name: "Normal"
        target_id: 0
    total_images: 33920
    has_masks: true
    notes: "Segmentation masks available in Lung_Masks/ and Infection_Masks/"

  # 2. CheXpert: Multi-label radiograph dataset (Stanford)
  chexpert:
    root: "data/raw/chexpert"
    format: "csv_manifest"
    manifest: "data/raw/chexpert/train.csv"
    image_col: "Path"
    label_cols:
      - "Consolidation"               # → Pneumonia (when positive)
      - "Lung Opacity"                 # → Fibrosis (when positive)
      - "Pleural Effusion"            # → Fibrosis (when positive)
      - "No Finding"                   # → Normal
    mapping_rules:
      "No Finding == 1": 0             # Normal
      "Consolidation == 1": 2          # Pneumonia
      "Lung Opacity == 1": 5           # Fibrosis
    total_images: 224316
    uncertain_policy: "ignore"         # drop uncertain (-1) labels
    notes: "Multi-label; we pick the dominant positive finding per image"

  # 3. NIH ChestX-ray14: Large-scale multi-label dataset
  nih_chestxray14:
    root: "data/raw/nih_chestxray14"
    format: "csv_manifest"
    manifest: "data/raw/nih_chestxray14/Data_Entry_2017.csv"
    image_col: "Image Index"
    label_col: "Finding Labels"
    image_dir: "data/raw/nih_chestxray14/images"
    mapping_rules:
      "No Finding": 0                 # Normal
      "Pneumonia": 2                   # Pneumonia
      "Fibrosis": 5                    # Fibrosis
      "Infiltration": 2               # Pneumonia (closest match)
    total_images: 112120
    notes: "Pipe-separated multi-labels; keep only single-finding images or dominant"

  # 4. VinDr-CXR: Bounding-box annotated dataset
  vindr_cxr:
    root: "data/raw/vindr_cxr"
    format: "csv_manifest"
    manifest: "data/raw/vindr_cxr/annotations/image_labels.csv"
    image_col: "image_id"
    label_col: "class_name"
    image_dir: "data/raw/vindr_cxr/train"
    image_ext: ".dicom"
    bbox_file: "data/raw/vindr_cxr/annotations/annotations_train.csv"
    mapping_rules:
      "No finding": 0                 # Normal
      "Pneumonia": 2
      "Tuberculosis": 3
      "Lung tumor": 4                 # Lung_Cancer
      "Pulmonary fibrosis": 5         # Fibrosis
    total_images: 18000
    has_bboxes: true
    notes: "DICOM format; convert to PNG during preprocessing"

  # 5. Shenzhen TB: Small TB-specific dataset
  shenzhen_tb:
    root: "data/raw/shenzhen_tb"
    format: "imagenet_folder"
    classes:
      - source_name: "tuberculosis"
        target_id: 3
      - source_name: "normal"
        target_id: 0
    total_images: 662
    notes: "Small dataset; will be heavily oversampled"

  # 6. LIDC-IDRI: Lung nodule CT dataset (projected to 2D)
  lidc_idri:
    root: "data/raw/lidc_idri"
    format: "csv_manifest"
    manifest: "data/raw/lidc_idri/nodule_manifest.csv"
    image_col: "slice_path"
    label_col: "malignancy"
    mapping_rules:
      "malignancy >= 3": 4             # Lung_Cancer
      "malignancy < 3": 0              # Normal / benign
    total_images: 1018
    has_nodule_annotations: true
    notes: "CT slices projected to 2D CXR-like views; nodule masks available"
