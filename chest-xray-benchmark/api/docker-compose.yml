# =============================================================================
# Docker Compose — Chest X-ray Multi-Disease Detection API
# =============================================================================
version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: chest-xray-api
    ports:
      - "8000:8000"
    volumes:
      - ../outputs:/app/outputs:ro
      - ../configs:/app/configs:ro
    environment:
      - DEVICE=cpu
      - NUM_WORKERS=2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
